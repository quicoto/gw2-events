<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guild Wars 2 · Daily Events Tracker</title>
  <link rel="stylesheet" href="styles.css?ver=1.0.1">
</head>
<body>
  <main>
    <header>
      <h1>Daily Events</h1>
      <p class="subtitle">Resets at midnight</p>
    </header>

    <form id="events-form" autocomplete="off">
      <fieldset class="event-group">
        <legend>World Bosses</legend>
        <ul class="event-list">
          <li>
            <label class="event-item">
              <input type="checkbox" id="dragonstorm">
              <span class="checkmark" aria-hidden="true"></span>
              <span class="event-name">Dragonstorm</span>
            </label>
            <p class="event-time">
              09:00, 11:00, 13:00, 15:00, 17:00, 19:00, 21:00, 23:00
            </p>
          </li>
          <li>
            <label class="event-item">
              <input type="checkbox" id="matriarch">
              <span class="checkmark" aria-hidden="true"></span>
              <span class="event-name">Matriarch</span>
            </label>
            <p class="event-time">
              XX:09 (16:09 works)
            </p>
          </li>
          <li>
            <label class="event-item">
              <input type="checkbox" id="tequatl">
              <span class="checkmark" aria-hidden="true"></span>
              <span class="event-name">Tequatl the Sunless</span>
            </label>
            <p class="event-time">
              13:30, 18:00, 21:00
            </p>
          </li>
          <li>
            <label class="event-item">
              <input type="checkbox" id="twisted-marionette">
              <span class="checkmark" aria-hidden="true"></span>
              <span class="event-name">The Twisted Marionette</span>
            </label>
            <p class="event-time">
              10:00, 12:00, 14:00, 16:00, 18:00, 20:00, 22:00, 00:00
            </p>
          </li>
          <li>
            <label class="event-item">
              <input type="checkbox" id="triple-trouble">
              <span class="checkmark" aria-hidden="true"></span>
              <span class="event-name">Triple Trouble</span>
            </label>
          </li>
          <p class="event-time">
            10:00, 14:30, 19:00, 22:00
          </p>
        </ul>
      </fieldset>
    </form>
    <footer>
      <a href="https://github.com/quicoto/gw2-events">GitHub</a>
    </footer>
  </main>

  <script src="app.js?ver=1.0.1"></script>
</body>
</html>
